<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Received Voucher Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; max-width: 800px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { padding: 8px; margin: 5px; width: 250px; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; cursor: pointer; border-radius: 4px; }
        
        /* The Voucher Design */
        #voucher-template {
            width: 800px; height: 500px; background: white; border: 2px solid #333;
            padding: 30px; position: relative; color: #333; margin: 0 auto;
        }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .title { text-align: center; margin-top: 10px; }
        .amount-box { position: absolute; top: 110px; right: 40px; border: 2px solid #333; padding: 10px 20px; font-weight: bold; font-size: 20px; }
        .row { display: flex; justify-content: space-between; margin-top: 25px; border-bottom: 1px dotted #ccc; padding-bottom: 5px; }
        .footer { display: flex; justify-content: space-between; margin-top: 80px; border-top: 2px solid #333; padding-top: 10px; text-align: center; font-size: 12px; }
        .rtl { direction: rtl; font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body>

<div class="controls">
    <h3>Voucher Input</h3>
    <input type="text" id="v_num" placeholder="Voucher # (e.g. 2,230)">
    <input type="text" id="v_name" placeholder="Received From Mr.">
    <input type="text" id="v_sum" placeholder="The Sum Of (In Words)">
    <input type="text" id="v_for" placeholder="For / مقابل">
    <button onclick="generatePDF()">Download Editable PDF</button>
</div>

<div id="voucher-template">
    <div class="header">
        <div><strong># <span id="out_num">2,230</span></strong></div>
        <div class="rtl">Novo Space Optical<br>س. ت : 2051235564</div>
    </div>

    <div class="title">
        <h2 style="margin:0;">سند قبض</h2>
        <h3 style="margin:0;">Received Voucher</h3>
    </div>

    <div class="amount-box">﷼ <span id="out_amount">2,230</span></div>

    <div class="row">
        <span>Received From Mr. <strong id="out_name">................</strong></span>
        <span class="rtl">استلمنا من</span>
    </div>

    <div class="row">
        <span>The Sum Of <strong id="out_sum">................</strong></span>
        <span class="rtl">مبلغاً وقدره</span>
    </div>

    <div class="row">
        <span>For <strong id="out_for">................</strong></span>
        <span class="rtl">وذلك مقابل</span>
    </div>

    <div class="footer">
        <div>Manager Sig.<br>توقيع المدير</div>
        <div>Cashier Sig.<br>أمين الصندوق</div>
        <div>Received Sig.<br>توقيع المستلم</div>
    </div>
</div>

<script>
    function generatePDF() {
        // Sync inputs to template
        document.getElementById('out_num').innerText = document.getElementById('v_num').value;
        document.getElementById('out_amount').innerText = document.getElementById('v_num').value;
        document.getElementById('out_name').innerText = document.getElementById('v_name').value;
        document.getElementById('out_sum').innerText = document.getElementById('v_sum').value;
        document.getElementById('out_for').innerText = document.getElementById('v_for').value;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'px', [842, 595]); // Landscape

        html2canvas(document.querySelector("#voucher-template")).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            doc.addImage(imgData, 'PNG', 20, 20, 800, 500);
            doc.save("Voucher.pdf");
        });
    }
</script>

</body>
</html>
